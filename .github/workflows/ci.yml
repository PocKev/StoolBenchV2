name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backend tests in Docker
        run: docker compose run --rm --no-deps --build bench-processor python -m pytest -q tests
